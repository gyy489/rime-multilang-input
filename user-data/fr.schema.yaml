# Rime schema
# encoding: utf-8

schema:
  schema_id: fr
  name: Français
  version: "2026-05-16"
  author:
    - "Generated from hermitdave/FrequencyWords"
  description: |
    French table dictionary for mixed Chinese / English / French input.

switches:
  - name: ascii_mode
    reset: 0
    states: [FR, ASCII]

engine:
  processors:
    - ascii_composer
    - key_binder
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - matcher
    - ascii_segmentor
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - table_translator
  filters:
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " '"

translator:
  dictionary: fr
  enable_completion: true
  enable_sentence: false
  enable_user_dict: true
  spelling_hints: 0

key_binder:
  import_preset: default

recognizer:
  import_preset: default
